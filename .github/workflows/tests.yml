name: Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: Test on Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install UV
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv pip install -e ".[dev]"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg patchelf file

      - name: Lint with ruff
        run: uv pip install ruff && ruff check .

      - name: Type check with mypy
        run: uv pip install mypy && mypy . --ignore-missing-imports

      - name: Run tests
        run: python -m pytest tests/ -v --cov=. --cov-report=xml --cov-reportterm=term-missing

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false