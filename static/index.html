<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>app2nix - Convert .deb to NixOS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        body { background: #0d1117; color: #c9d1d9; }
        .card { background: #161b22; border: 1px solid #30363d; }
        .btn-primary { background: #238636; border: none; }
        .btn-primary:hover { background: #2ea043; }
        .drop-zone {
            border: 2px dashed #30363d;
            border-radius: 8px;
            padding: 40px;
            text-align: center;
            transition: all 0.3s;
            cursor: pointer;
        }
        .drop-zone:hover, .drop-zone.dragover { border-color: #238636; background: #161b22; }
        .drop-zone.dragover { background: #1c2128; }
        .nix-code {
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 6px;
            padding: 15px;
            font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
            font-size: 13px;
            max-height: 400px;
            overflow: auto;
            white-space: pre;
            color: #7ee787;
        }
        .badge-dep { background: #21262d; color: #58a6ff; font-size: 12px; padding: 4px 8px; margin: 2px; }
        .loading { display: none; }
        .loading.active { display: inline-block; }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark bg-dark border-bottom border-secondary">
        <div class="container">
            <a class="navbar-brand" href="#"><i class="bi bi-box-seam"></i> app2nix</a>
            <span class="navbar-text text-muted">Convert .deb to NixOS</span>
        </div>
    </nav>

    <div class="container py-5">
        <div class="row">
            <div class="col-lg-8 mx-auto">
                <div class="card p-4">
                    <h4 class="mb-4"><i class="bi bi-upload"></i> Upload .deb File</h4>
                    
                    <div class="drop-zone" id="dropZone">
                        <i class="bi bi-cloud-arrow-up display-4 text-muted"></i>
                        <p class="mt-3 mb-0">Drag & drop .deb file here</p>
                        <p class="text-muted small">or click to browse</p>
                        <input type="file" id="fileInput" accept=".deb" hidden>
                    </div>

                    <div class="mt-4">
                        <div class="input-group">
                            <input type="text" class="form-control bg-dark text-light" id="urlInput" placeholder="Or enter URL to .deb file">
                            <button class="btn btn-primary" type="button" id="urlBtn"><i class="bi bi-download"></i> Fetch</button>
                        </div>
                    </div>

                    <div class="mt-3 text-center">
                        <span class="loading spinner-border spinner-border-sm active"></span>
                        <span class="text-muted" id="statusText"></span>
                    </div>
                </div>

                <div class="card p-4 mt-4" id="resultCard" style="display: none;">
                    <h4 class="mb-3"><i class="bi bi-info-circle"></i> Package Info</h4>
                    <table class="table table-dark">
                        <tr><td>Name</td><td id="pkgName">-</td></tr>
                        <tr><td>Version</td><td id="pkgVersion">-</td></tr>
                        <tr><td>Architecture</td><td id="pkgArch">-</td></tr>
                    </table>

                    <h5 class="mt-4">Nix Dependencies</h5>
                    <div class="mb-3" id="depsList"></div>

                    <h5 class="mt-4">Generated default.nix</h5>
                    <div class="nix-code" id="nixCode"></div>
                    
                    <div class="mt-3">
                        <button class="btn btn-primary" id="copyBtn"><i class="bi bi-clipboard"></i> Copy</button>
                        <button class="btn btn-outline-secondary" id="downloadBtn"><i class="bi bi-download"></i> Download</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer class="text-center py-4 text-muted border-top border-secondary">
        <small>app2nix &copy; 2026</small>
    </footer>

    <script>
        const API_URL = window.location.origin;
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const urlInput = document.getElementById('urlInput');
        const urlBtn = document.getElementById('urlBtn');
        const statusText = document.getElementById('statusText');
        const resultCard = document.getElementById('resultCard');
        let currentNix = '';

        dropZone.addEventListener('click', () => fileInput.click());
        
        dropZone.addEventListener('dragover', e => {
            e.preventDefault();
            dropZone.classList.add('dragover');
        });
        
        dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
        
        dropZone.addEventListener('drop', e => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            const file = e.dataTransfer.files[0];
            if (file) uploadFile(file);
        });

        fileInput.addEventListener('change', e => {
            const file = e.target.files[0];
            if (file) uploadFile(file);
        });

        urlBtn.addEventListener('click', async () => {
            const url = urlInput.value.trim();
            if (!url) return;
            setLoading('Fetching...');
            try {
                const res = await fetch(`${API_URL}/download`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({url})
                });
                const data = await res.json();
                showResult({name: data.name, version: data.version, architecture: 'amd64', nix_dependencies: data.nix_dependencies}, '');
            } catch (err) {
                setLoading('Error: ' + err.message);
            }
        });

        async function uploadFile(file) {
            setLoading('Analyzing...');
            const formData = new FormData();
            formData.append('file', file);

            try {
                const [infoRes, nixRes] = await Promise.all([
                    fetch(`${API_URL}/analyze`, {method: 'POST', body: formData}),
                    fetch(`${API_URL}/generate`, {method: 'POST', body: formData})
                ]);
                
                const info = await infoRes.json();
                const nix = await nixRes.json();
                showResult(info, nix.content);
            } catch (err) {
                setLoading('Error: ' + err.message);
            }
        }

        function showResult(info, nixContent) {
            document.getElementById('pkgName').textContent = info.name;
            document.getElementById('pkgVersion').textContent = info.version;
            document.getElementById('pkgArch').textContent = info.architecture;
            
            const depsList = document.getElementById('depsList');
            depsList.innerHTML = info.nix_dependencies.map(d => `<span class="badge-dep">pkgs.${d}</span>`).join('');
            
            currentNix = nixContent;
            document.getElementById('nixCode').textContent = nixContent;
            resultCard.style.display = 'block';
            setLoading('');
        }

        document.getElementById('copyBtn').addEventListener('click', () => {
            navigator.clipboard.writeText(currentNix);
            document.getElementById('copyBtn').innerHTML = '<i class="bi bi-check"></i> Copied!';
            setTimeout(() => document.getElementById('copyBtn').innerHTML = '<i class="bi bi-clipboard"></i> Copy', 2000);
        });

        document.getElementById('downloadBtn').addEventListener('click', () => {
            const blob = new Blob([currentNix], {type: 'text/plain'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'default.nix';
            a.click();
        });

        function setLoading(msg) {
            statusText.textContent = msg;
            document.querySelector('.loading').classList.toggle('active', !!msg);
        }
    </script>
</body>
</html>
